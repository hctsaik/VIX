name: "@vix/review"
version: 0.1.0
description: "VIX review workstation: confirm/relabel/dismiss + explain drill-down in the FiftyOne App"
fiftyone:
  version: ">=0.23"
operators:
  - open_review_workstation
  - load_dataset
  - delete_dataset
  - build_similarity
  - find_similar
  - compute_visualization
  - confirm_golden
  - dismiss_false_alarm
  - explain_sample
  - generate_weakness_report
  - flag_label_issues
  - audit_label_errors
  - flag_loose_boxes
  - flag_image_quality
panels:
  - vix_report
  - vix_eval
  - vix_queue
