name: VIX CI

# 每次 push / PR 自動回歸:Tier-1(純核心)+ Tier-2(真實 FiftyOne + Playwright)
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tier1-core:
    name: Tier-1 核心(pytest,無 FiftyOne)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install (core + dev)
        run: pip install -e ".[dev]"
      - name: Run pytest（預期 102 passed）
        run: python -m pytest -q

  tier2-fiftyone:
    name: Tier-2(FiftyOne + Playwright 驗收)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FIFTYONE_DO_NOT_TRACK: "true"
      PYTHONIOENCODING: "utf-8"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (core + FiftyOne + Playwright)
        # 鎖到本機實測 known-good 版本,避免「抓最新」造成的版本漂移失敗。
        # 與 requirements-tier2.txt 對齊;verify-* 用 pixel_fallback,不需 torch。
        run: |
          pip install -e .
          pip install "fiftyone==1.16.0" "playwright==1.60.0"
          playwright install --with-deps chromium
      - name: verify-fiftyone（headless:adapter 全鏈 + sync_reviews 回寫閉環）
        run: vix --workspace ./vixws verify-fiftyone
      - name: verify-gui（Playwright 驅動 App + 實際執行 confirm_golden operator）
        run: vix --workspace ./vixws verify-gui
      - name: 上傳 GUI 截圖 artifact
        if: always()  # 失敗也上傳,方便除錯
        uses: actions/upload-artifact@v4
        with:
          name: fiftyone-gui-screenshots
          path: vixws/gui_shots/*.png
          if-no-files-found: warn
